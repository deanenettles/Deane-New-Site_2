<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            max-width: 900px;
            gap: 15px;
        }

        .gallery-item {
            width: 280px;
            height: 280px;
            overflow: hidden;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Slideshow Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-image {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .caption {
            color: white;
            font-size: 1.2rem;
            margin-top: 20px;
            text-align: center;
            padding: 0 20px;
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: -10px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 10px;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #ccc;
        }

        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            font-size: 3rem;
            padding: 20px 25px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            z-index: 1001;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .prev-btn {
            left: 20px;
            border-radius: 0 8px 8px 0;
        }

        .next-btn {
            right: 20px;
            border-radius: 8px 0 0 8px;
        }

        .image-counter {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="gallery">
        <div class="gallery-item">
            <img src="IMG_3769.JPG" alt="Image 1">
        </div>
        <div class="gallery-item">
            <img src="IMG_1579.jpeg" alt="Image 2">
        </div>
        <div class="gallery-item">
            <img src="IMG_1567.jpeg" alt="Image 3">
        </div>
        <div class="gallery-item">
            <img src="IMG_1561.jpeg" alt="Image 4">
        </div>
        <div class="gallery-item">
            <img src="IMG_5198.jpeg" alt="Image 5">
        </div>
        <div class="gallery-item">
            <img src="IMG_0359.jpeg" alt="Image 6">
        </div>
        <div class="gallery-item">
            <img src="IMG_3290.jpeg" alt="Deane and nieces and nephew">
        </div>
        <div class="gallery-item">
            <img src="IMG_7918.jpeg" alt="Deane & Hillary underlit">
        </div>
        <div class="gallery-item">
            <img src="IMG_0263.jpeg" alt="Doing Dishes">
        </div>
    </div>

    <div class="modal" id="slideshow">
        <button class="close-btn" id="closeBtn">&times;</button>
        <button class="nav-btn prev-btn" id="prevBtn">&#10094;</button>
        <div class="modal-content">
            <img class="modal-image" id="modalImage" src="" alt="">
            <p class="caption" id="caption"></p>
            <p class="image-counter" id="imageCounter"></p>
        </div>
        <button class="nav-btn next-btn" id="nextBtn">&#10095;</button>
    </div>

    <script>
        const galleryItems = document.querySelectorAll('.gallery-item img');
        const modal = document.getElementById('slideshow');
        const modalImage = document.getElementById('modalImage');
        const caption = document.getElementById('caption');
        const imageCounter = document.getElementById('imageCounter');
        const closeBtn = document.getElementById('closeBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        let currentIndex = 0;
        const images = Array.from(galleryItems);

        function openSlideshow(index) {
            currentIndex = index;
            updateSlideshow();
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSlideshow() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        function updateSlideshow() {
            const img = images[currentIndex];
            modalImage.src = img.src;
            modalImage.alt = img.alt;
            caption.textContent = img.alt;
            imageCounter.textContent = `${currentIndex + 1} / ${images.length}`;
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            updateSlideshow();
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateSlideshow();
        }

        // Event listeners
        galleryItems.forEach((img, index) => {
            img.parentElement.addEventListener('click', () => openSlideshow(index));
        });

        closeBtn.addEventListener('click', closeSlideshow);
        nextBtn.addEventListener('click', nextImage);
        prevBtn.addEventListener('click', prevImage);

        // Close on background click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeSlideshow();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('active')) return;

            switch(e.key) {
                case 'ArrowRight':
                    nextImage();
                    break;
                case 'ArrowLeft':
                    prevImage();
                    break;
                case 'Escape':
                    closeSlideshow();
                    break;
            }
        });
    </script>
</body>
</html>
